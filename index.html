<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ticket Toro — Class Action Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      /* ── Dark mode (default) — navy-indigo palette matching Ticket Toro ── */
      :root {
        --bg-page:      #0f1025;
        --bg-card:      #181a38;
        --bg-card-hov:  #1e2042;
        --bg-header:    rgba(10,10,28,0.98);
        --bg-input:     #0f1025;
        --bg-drawer:    #181a38;
        --bg-drawer-hd: #131430;
        --bg-surface:   rgba(120,130,255,0.07);
        --bg-surface2:  rgba(120,130,255,0.04);
        --border:       rgba(120,130,220,0.12);
        --border-hov:   rgba(150,160,255,0.22);
        --border-md:    rgba(120,130,220,0.16);
        --text-1:       #eaeaf8;
        --text-2:       #c0c2dc;
        --text-3:       #9a9cb8;
        --text-4:       #7e80a0;
        --text-5:       #666888;
        --text-6:       #545672;
        --text-7:       #424460;
      }

      /* ── Light mode overrides ── */
      body.light {
        --bg-page:      #f0f1f7;
        --bg-card:      #ffffff;
        --bg-card-hov:  #f5f6fc;
        --bg-header:    rgba(255,255,255,0.98);
        --bg-input:     #f5f6fc;
        --bg-drawer:    #ffffff;
        --bg-drawer-hd: #f8f9fd;
        --bg-surface:   rgba(0,0,0,0.04);
        --bg-surface2:  rgba(0,0,0,0.025);
        --border:       rgba(0,0,0,0.08);
        --border-hov:   rgba(0,0,0,0.15);
        --border-md:    rgba(0,0,0,0.10);
        --text-1:       #1a1b2e;
        --text-2:       #3a3b5c;
        --text-3:       #5c5d7a;
        --text-4:       #787898;
        --text-5:       #8a8aaa;
        --text-6:       #9090b0;
        --text-7:       #a0a0c0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: var(--bg-page);
      }

      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: var(--bg-page); }
      ::-webkit-scrollbar-thumb { background: var(--border-hov); border-radius: 3px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
