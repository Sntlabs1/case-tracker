<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ticket Toro — Class Action Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=Playfair+Display:wght@400;700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      /* ── Default (light) — credit.com brand: warm cream surfaces,
            warm ink text, muted teal accent, charcoal sidebar ── */
      :root {
        --bg-page:      #FEFEFC;
        --bg-card:      #FDFBF7;
        --bg-card-hov:  #FCF8EF;
        --bg-header:    #FEFEFC;
        --bg-input:     #EEF5F7;
        --bg-drawer:    #303030;
        --bg-drawer-hd: #262626;
        --bg-surface:   rgba(45,125,149,0.08);
        --bg-surface2:  rgba(45,125,149,0.04);
        --border:       #D4D4D4;
        --border-hov:   rgba(45,125,149,0.45);
        --border-md:    rgba(24,22,17,0.20);
        --text-1:       #181611;
        --text-2:       #303030;
        --text-3:       #454545;
        --text-4:       #5F5746;
        --text-5:       #7d7464;
        --text-6:       #9c9384;
        --text-7:       #c2bab0;

        --accent:        #2D7D95;
        --accent-strong: #004F58;
        --accent-soft:   rgba(45,125,149,0.12);
        --accent-dim:    rgba(45,125,149,0.22);
        --accent-text:   #ffffff;

        --nav-text:      rgba(255,255,255,0.72);
        --nav-text-act:  #ffffff;
        --nav-bg-act:    rgba(255,255,255,0.16);
        --nav-border-act: #B3EDF7;

        --radius-card:   12px;
        --radius-pill:   8px;
        --shadow-card:   none;
      }

      /* ── Dark mode — warm ink + charcoal, light teal accent ── */
      body.dark {
        --bg-page:      #181611;
        --bg-card:      #242118;
        --bg-card-hov:  #2b281e;
        --bg-header:    #1d1a13;
        --bg-input:     #242118;
        --bg-drawer:    #001F28;
        --bg-drawer-hd: #00161d;
        --bg-surface:   rgba(254,254,252,0.08);
        --bg-surface2:  rgba(254,254,252,0.05);
        --border:       rgba(212,212,212,0.16);
        --border-hov:   rgba(130,211,224,0.40);
        --border-md:    rgba(212,212,212,0.22);
        --text-1:       #FEFEFC;
        --text-2:       #F8F0DF;
        --text-3:       #d9d2c2;
        --text-4:       #b3ab99;
        --text-5:       #8f8775;
        --text-6:       #6b6454;
        --text-7:       #474336;

        --accent:        #82D3E0;
        --accent-strong: #B3EDF7;
        --accent-soft:   rgba(130,211,224,0.16);
        --accent-dim:    rgba(130,211,224,0.28);
        --accent-text:   #001F28;
        --shadow-card:   none;

        --nav-text:      rgba(254,254,252,0.70);
        --nav-text-act:  #ffffff;
        --nav-bg-act:    rgba(130,211,224,0.18);
        --nav-border-act: #82D3E0;
      }

      body {
        font-family: 'DM Sans', -apple-system, 'Segoe UI', sans-serif;
        background: #FEFEFC;
        background-attachment: fixed;
        min-height: 100vh;
      }
      body.dark {
        background: #181611;
        background-attachment: fixed;
      }

      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(45,125,149,0.28); border-radius: 2px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(45,125,149,0.50); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
