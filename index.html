<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ticket Toro — Class Action Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      /* ── Default (light) — white content + cobalt blue sidebar ── */
      :root {
        --bg-page:      #f4f8ff;
        --bg-card:      #ffffff;
        --bg-card-hov:  #eef4ff;
        --bg-header:    #ffffff;
        --bg-input:     #eaf0ff;
        --bg-drawer:    #1d4ed8;
        --bg-drawer-hd: #1535b0;
        --bg-surface:   rgba(29,78,216,0.08);
        --bg-surface2:  rgba(29,78,216,0.04);
        --border:       rgba(29,78,216,0.16);
        --border-hov:   rgba(29,78,216,0.35);
        --border-md:    rgba(29,78,216,0.22);
        --text-1:       #08102a;
        --text-2:       #0d2050;
        --text-3:       #1a3878;
        --text-4:       #2858b8;
        --text-5:       #3b78d8;
        --text-6:       #5a96ea;
        --text-7:       #8ab8f8;

        --accent:        #1d4ed8;
        --accent-strong: #1535b0;
        --accent-soft:   rgba(29,78,216,0.12);
        --accent-dim:    rgba(29,78,216,0.22);
        --accent-text:   #ffffff;

        --nav-text:      rgba(255,255,255,0.72);
        --nav-text-act:  #ffffff;
        --nav-bg-act:    rgba(255,255,255,0.18);
        --nav-border-act: rgba(255,255,255,0.95);

        --radius-card:   4px;
        --radius-pill:   4px;
        --shadow-card:   0 1px 3px rgba(0,0,0,0.06), 0 2px 10px rgba(29,78,216,0.10);
      }

      /* ── Dark mode — deep blue, no grey ── */
      body.dark {
        --bg-page:      #0c1640;
        --bg-card:      #112056;
        --bg-card-hov:  #162868;
        --bg-header:    #0e1a4a;
        --bg-input:     #0e1a4a;
        --bg-drawer:    #091230;
        --bg-drawer-hd: #060c1e;
        --bg-surface:   rgba(255,255,255,0.10);
        --bg-surface2:  rgba(255,255,255,0.06);
        --border:       rgba(74,158,255,0.16);
        --border-hov:   rgba(74,158,255,0.32);
        --border-md:    rgba(74,158,255,0.20);
        --text-1:       #eef6ff;
        --text-2:       #c0d8fc;
        --text-3:       #8ab8f8;
        --text-4:       #5090e8;
        --text-5:       #2a60c0;
        --text-6:       #1840a0;
        --text-7:       #0e2870;

        --accent:        #4a9eff;
        --accent-strong: #70bcff;
        --accent-soft:   rgba(74,158,255,0.16);
        --accent-dim:    rgba(74,158,255,0.26);
        --accent-text:   #ffffff;
        --shadow-card:   0 1px 0 rgba(255,255,255,0.04) inset, 0 2px 14px rgba(0,0,0,0.50);

        --nav-text:      rgba(180,210,255,0.75);
        --nav-text-act:  #ffffff;
        --nav-bg-act:    rgba(74,158,255,0.22);
        --nav-border-act: #4a9eff;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #f4f8ff;
        background-attachment: fixed;
        min-height: 100vh;
      }
      body.dark {
        background: #0c1640;
        background-attachment: fixed;
      }

      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(59,130,246,0.25); border-radius: 2px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(59,130,246,0.45); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
