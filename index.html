<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ticket Toro — Class Action Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      /* ── Dark mode (default) — Settlement Radar palette: deep navy + mint accent ── */
      :root {
        --bg-page:      #050b18;
        /* Cards are gradients now — slightly lighter top, darker bottom — sitting
           atop a glassy translucent surface so the body gradient bleeds through. */
        --bg-card:      linear-gradient(180deg, rgba(18,32,55,0.72) 0%, rgba(10,18,32,0.72) 100%);
        --bg-card-hov:  linear-gradient(180deg, rgba(24,40,68,0.78) 0%, rgba(14,24,42,0.78) 100%);
        --bg-header:    rgba(5,11,24,0.85);
        --bg-input:     rgba(5,11,24,0.6);
        --bg-drawer:    linear-gradient(180deg, rgba(10,20,40,0.6) 0%, rgba(5,11,24,0.6) 100%);
        --bg-drawer-hd: rgba(5,11,24,0.4);
        --bg-surface:   rgba(94,234,212,0.05);
        --bg-surface2:  rgba(94,234,212,0.025);
        --border:       rgba(94,234,212,0.10);
        --border-hov:   rgba(94,234,212,0.22);
        --border-md:    rgba(94,234,212,0.14);
        --text-1:       #eaf6f3;
        --text-2:       #c5dcd6;
        --text-3:       #9ec4bd;
        --text-4:       #7ba39c;
        --text-5:       #5e827b;
        --text-6:       #4a6963;
        --text-7:       #38524d;

        /* Accent — replaces previous Ticket Toro orange (#C8442F). */
        --accent:        #5eead4;
        --accent-strong: #2dd4bf;
        --accent-soft:   rgba(94,234,212,0.12);
        --accent-dim:    rgba(94,234,212,0.20);
        --accent-text:   #051512; /* dark text on cyan button */

        /* Card chrome */
        --radius-card:   16px;
        --radius-pill:   999px;
        --shadow-card:   0 1px 0 rgba(255,255,255,0.04) inset, 0 8px 24px rgba(0,0,0,0.35);
      }

      /* ── Light mode overrides ── */
      body.light {
        --bg-page:      #f3f7f8;
        --bg-card:      linear-gradient(180deg, rgba(255,255,255,0.95) 0%, rgba(248,253,253,0.95) 100%);
        --bg-card-hov:  linear-gradient(180deg, rgba(255,255,255,1) 0%, rgba(245,250,250,1) 100%);
        --bg-header:    rgba(255,255,255,0.98);
        --bg-input:     #f5fafa;
        --bg-drawer:    linear-gradient(180deg, rgba(255,255,255,0.96) 0%, rgba(248,253,253,0.96) 100%);
        --bg-drawer-hd: #f8fcfc;
        --bg-surface:   rgba(0,40,40,0.04);
        --bg-surface2:  rgba(0,40,40,0.02);
        --border:       rgba(0,80,75,0.10);
        --border-hov:   rgba(0,80,75,0.20);
        --border-md:    rgba(0,80,75,0.14);
        --text-1:       #051512;
        --text-2:       #1a2a26;
        --text-3:       #2e423d;
        --text-4:       #3c5751;
        --text-5:       #4a6963;
        --text-6:       #587a73;
        --text-7:       #678c84;

        --accent:        #14b8a6;
        --accent-strong: #0d9488;
        --accent-soft:   rgba(20,184,166,0.10);
        --accent-dim:    rgba(20,184,166,0.18);
        --accent-text:   #ffffff;
        --shadow-card:   0 1px 2px rgba(0,0,0,0.04), 0 8px 24px rgba(0,40,40,0.06);
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background:
          radial-gradient(ellipse 1200px 800px at 75% -10%, rgba(94,234,212,0.06) 0%, transparent 60%),
          radial-gradient(ellipse 1000px 700px at 0% 110%, rgba(45,212,191,0.04) 0%, transparent 55%),
          linear-gradient(180deg, #060e1d 0%, #050b18 50%, #03070f 100%);
        background-attachment: fixed;
        min-height: 100vh;
      }
      body.light {
        background:
          radial-gradient(ellipse 1200px 800px at 75% -10%, rgba(20,184,166,0.05) 0%, transparent 60%),
          linear-gradient(180deg, #f5fafa 0%, #eef5f4 100%);
        background-attachment: fixed;
      }

      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--border-hov); border-radius: 3px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
